<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- iPad / Safari optimized viewport -->
    <meta 
      name="viewport" 
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" 
    />
    
    <!-- Apple Pencil / iPad specific -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Disable double-tap zoom -->
    <meta name="touch-action" content="none" />
    
    <!-- iOS text selection disable -->
    <style>
      * { -webkit-user-select: none !important; user-select: none !important; -webkit-touch-callout: none !important; }
      html, body { -webkit-user-select: none !important; user-select: none !important; }
    </style>
    
    <title>グリッド模写練習アプリ</title>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
